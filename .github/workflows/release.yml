name: Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  portable-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable zip
        run: npm run package:portable

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Toodo feedback preview release.

          Downloads:
          - Toodo-portable.zip: no-install HTML version
          - Toodo-desktop-windows-*.exe/msi: Windows desktop installer, when available

          Notes:
          - Portable data is stored in browser storage. Use Export for backups.
          - Desktop data is stored as JSON files in the OS app data directory.
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" \
              --title "Toodo ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --prerelease
          gh release upload "${GITHUB_REF_NAME}" release/Toodo-portable.zip --clobber

  desktop-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop installers
        run: npm run package:desktop

      - name: Optional Windows signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PATH: ${{ secrets.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: ./scripts/sign-windows.ps1

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" --title "Toodo $env:GITHUB_REF_NAME" --notes "Toodo desktop and portable preview release." --prerelease
          }
          Get-ChildItem release -Filter "Toodo-desktop-windows-*" | ForEach-Object {
            gh release upload "$env:GITHUB_REF_NAME" $_.FullName --clobber
          }
